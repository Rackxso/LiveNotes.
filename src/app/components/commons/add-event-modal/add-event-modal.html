<!-- add-event-modal.html -->
<div class="overlay" (click)="onCerrar()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>{{ esEdicion ? t()('modal.editEvent') : t()('modal.newEvent') }}</h2>
      <button class="close-btn" (click)="onCerrar()">✕</button>
    </div>

    <div class="field">
      <label>{{ t()('modal.title') }}</label>
      <input type="text" [(ngModel)]="titulo" [placeholder]="t()('modal.titlePlaceholder')" />
    </div>

    <div class="row">
      <div class="field">
        <label>{{ t()('modal.date') }}</label>
        <input type="date" [(ngModel)]="fecha" />
      </div>
      <div class="field">
        <label>{{ t()('modal.time') }}</label>
        <input type="time" [(ngModel)]="hora" />
      </div>
    </div>

    <div class="field">
      <label>{{ t()('modal.description') }}</label>
      <textarea [(ngModel)]="descripcion" [placeholder]="t()('modal.descriptionPlaceholder')"></textarea>
    </div>

    <div class="field">
      <label>{{ t()('modal.recurrence.label') }}</label>
      <select [(ngModel)]="recurrenceType">
        @for (opt of recurrenceOptions; track opt.value) {
          <option [value]="opt.value">{{ t()(opt.labelKey) }}</option>
        }
      </select>
    </div>

    @if (recurrenceType !== 'none') {
      <div class="field">
        <label>{{ t()('modal.recurrence.endDate') }}</label>
        <input type="date" [(ngModel)]="recurrenceEnd" />
      </div>
    }

    <div class="modal-footer">
      <app-secondary-button class="small" [config]="{texto: t()('modal.cancel')}" (clicked)="onCerrar()" />
      <app-primary-button class="small" [config]="{texto: t()('modal.saveEvent')}" (clicked)="onGuardar()" />
    </div>

  </div>
</div>
