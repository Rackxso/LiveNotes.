<ul class="notes-grid" role="list">
  @for (note of filteredNotes(); track note._id) {
    <li class="note-card"
        role="button"
        tabindex="0"
        (click)="editNote.emit(note)"
        (keydown.enter)="editNote.emit(note)"
        (keydown.space)="editNote.emit(note)"
        [attr.aria-label]="'Edit note: ' + note.titulo">
      <button class="note-delete"
              (click)="onDeleteNote($event, note)"
              [attr.aria-label]="'Delete note: ' + note.titulo"
              title="Delete note">
        <i class="fa-solid fa-trash" aria-hidden="true"></i>
      </button>
      @if (note.categoria) {
        <span class="note-category" [class]="categoryClass(note.categoria)">{{ note.categoria }}</span>
      }
      <span class="note-title">{{ note.titulo }}</span>
      @if (note.contenido) {
        <span class="note-content">{{ note.contenido }}</span>
      }
    </li>
  }
  <li class="addBlank"
      role="button"
      tabindex="0"
      (click)="addNote.emit()"
      (keydown.enter)="addNote.emit()"
      (keydown.space)="addNote.emit()"
      aria-label="Add new note">
    <p>Add new note</p>
    <i class="fa-solid fa-circle-plus" aria-hidden="true"></i>
  </li>
</ul>
