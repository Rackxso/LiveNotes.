<dialog #dialogEl (click)="onBackdropClick($event)">
  <div class="modal-panel">

    <header class="modal-header">
      <h2 class="modal-title">{{ mode() === 'edit' ? t()('budgetModal.titleEdit') : t()('budgetModal.titleCreate') }}</h2>
      <button type="button" class="modal-close" (click)="close()" [attr.aria-label]="t()('budgetModal.close')">×</button>
    </header>

    <form class="create-form" [formGroup]="form" (ngSubmit)="submit()">

      @if (mode() === 'create') {
        <div class="field">
          <label for="b-nombre">{{ t()('budgetModal.category') }}</label>
          <input id="b-nombre" type="text" formControlName="nombre" [placeholder]="t()('budgetModal.categoryPlaceholder')" />
        </div>

        <div class="field">
          <label>{{ t()('budgetModal.color') }}</label>
          <div class="color-swatches">
            @for (c of colors; track c) {
              <button type="button" class="swatch"
                [style.background]="c"
                [class.selected]="selectedColor() === c"
                (click)="selectedColor.set(c)"
                [attr.aria-label]="c">
              </button>
            }
          </div>
        </div>
      }

      @if (mode() === 'edit') {
        <div class="field">
          <label>{{ t()('budgetModal.category') }}</label>
          <p class="edit-category-name">{{ editingName() }}</p>
        </div>
      }

      <div class="field">
        <label for="b-limite">{{ t()('budgetModal.limit') }}</label>
        <input id="b-limite" type="number" formControlName="limite" min="0.01" step="0.01" />
      </div>

      <div class="form-actions">
        @if (mode() === 'edit') {
          <button type="button" class="delete-btn" (click)="deleteBudget()">{{ t()('budgetModal.delete') }}</button>
        }
        <app-secondary-button class="small" [config]="{texto: t()('budgetModal.cancel')}" (clicked)="close()" />
        <app-primary-button class="small" [config]="{texto: t()('budgetModal.save'), type: 'submit'}" [disabled]="form.invalid" />
      </div>

    </form>
  </div>
</dialog>
