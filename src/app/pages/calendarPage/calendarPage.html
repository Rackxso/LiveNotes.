<app-header
  [vistasPage]="vistasPage()"
  [vistaActiva]="vistaActivaTraducida()"
  [iconosList]="vistasIconos"
  [name]="nombreVista()"
  (vistaSeleccionada)="onVistaSeleccionada($event)">
</app-header>

<div class="cuerpo" [class.sin-sheet]="vistaActual() !== 'Month'">
  <div class="calendar-wrapper">
    @switch (vistaActual()) {
      @case ('Week') {
        <app-week-view
          [eventos]="eventos()"
          [diaSeleccionado]="diaSeleccionado()"
          (diaSeleccionadoChange)="onDiaSeleccionado($event)"
          (eventoSeleccionado)="abrirDetalleEvento($event)">
        </app-week-view>
      }
      @case ('Day') {
        <app-day-view
          [eventos]="eventos()"
          [diaSeleccionado]="diaSeleccionado()"
          (diaSeleccionadoChange)="onDiaSeleccionado($event)"
          (eventoSeleccionado)="abrirDetalleEvento($event)">
        </app-day-view>
      }
      @default {
        <app-month-view
          [eventos]="eventos()"
          [diaSeleccionado]="diaSeleccionado()"
          (diaSeleccionadoChange)="onDiaSeleccionado($event)"
          (mesVisibleChange)="onMesVisibleChange($event)"
          (eventoSeleccionado)="abrirDetalleEvento($event)">
        </app-month-view>
      }
    }
  </div>

  <div class="bottom-sheet" [class.open]="bottomSheetAbierto()">
    <button class="sheet-handle"
            (click)="toggleBottomSheet()"
            [attr.aria-expanded]="bottomSheetAbierto()"
            aria-controls="sheet-content">
      <span class="handle-bar" aria-hidden="true"></span>
    </button>
    <app-eventos
      id="sheet-content"
      [diaSeleccionado]="diaSeleccionado()"
      [vista]="vistaActual()"
      [eventosDia]="eventosDia()"
      [eventosSemana]="eventosSemana()"
      [eventosMes]="eventosMes()"
      (addEventoDia)="abrirModalDia()"
      (eventoSeleccionado)="abrirDetalleEvento($event)"/>
  </div>
</div>

@if (modalAbierto() || eventoParaEditar()) {
  <app-add-event-modal
    [fechaInicial]="fechaModal()"
    [eventoEditar]="eventoParaEditar()"
    (cerrar)="cerrarModal()"
    (guardar)="onGuardarEvento($event)"
    (actualizar)="onActualizarEvento($event)" />
}

@if (eventoSeleccionado(); as ev) {
  <app-event-detail-modal
    [evento]="ev"
    [mostrarEnlaceCalendario]="false"
    [mostrarBotonEditar]="true"
    (cerrar)="cerrarDetalleEvento()"
    (editar)="abrirEdicionEvento(ev)" />
}
