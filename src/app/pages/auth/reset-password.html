<div class="login-shell">

  <aside class="brand-panel" aria-hidden="true">
    <div class="brand-logo">
      <img class="brand-logo-img" src="/Logo.png" alt="LiveNotes" />
    </div>
    <div class="brand-tagline">
      Todo en un<br><em>solo lugar.</em>
    </div>
  </aside>

  <main class="form-panel">
    <div class="form-card">

      @if (success()) {
        <div class="form-success">
          <div class="form-success-icon"><i class="fa-solid fa-lock"></i></div>
          <h1 class="form-title">¡Contraseña <em>cambiada!</em></h1>
          <p class="form-subtitle">Ya puedes iniciar sesión con tu nueva contraseña.</p>
          <a routerLink="/" class="confirm-btn-inline">Ir al inicio</a>
        </div>
      } @else {
        <h1 class="form-title">Nueva <em>contraseña</em></h1>
        <p class="form-subtitle">Elige una contraseña segura para tu cuenta.</p>

        <form (ngSubmit)="submit()" novalidate>

          <div class="field">
            <label class="field-label" for="np">Nueva contraseña</label>
            <input
              id="np"
              class="field-input"
              type="password"
              placeholder="••••••••"
              [value]="newPassword()"
              (input)="newPassword.set($any($event.target).value)"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="field">
            <label class="field-label" for="cp">Confirmar contraseña</label>
            <input
              id="cp"
              class="field-input"
              type="password"
              placeholder="••••••••"
              [value]="confirmPassword()"
              (input)="confirmPassword.set($any($event.target).value)"
              autocomplete="new-password"
              required
            />
          </div>

          @if (error()) {
            <div class="form-error" role="alert">{{ error() }}</div>
          }

          <app-primary-button
            class="full"
            [config]="{ texto: loading() ? 'Guardando…' : 'Guardar contraseña', type: 'submit' }"
            [disabled]="loading()"
          />

        </form>

        <p class="form-switch">
          <a routerLink="/">Ir al inicio</a>
        </p>
      }

    </div>
  </main>

</div>
