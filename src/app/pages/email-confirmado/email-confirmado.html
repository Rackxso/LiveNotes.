<div class="confirm-shell">
  <aside class="brand-panel" aria-hidden="true">
    <div class="brand-logo">
      <img class="brand-logo-img" src="/Logo.png" alt="LiveNotes" />
    </div>
    <div class="brand-tagline">
      Todo en un<br><em>solo lugar.</em>
    </div>
  </aside>

  <main class="form-panel">
    <div class="confirm-card">
      <div class="confirm-icon" aria-hidden="true">{{ config().icon }}</div>
      <h1 class="confirm-title">
        {{ config().title }} <em>{{ config().titleEm }}</em>
      </h1>
      <p class="confirm-message">{{ config().message }}</p>
      <a routerLink="/" class="confirm-btn">Ir al inicio</a>
    </div>
  </main>
</div>
