<app-header [name]="nombreVista()"></app-header>

<div class="body">

  <!-- NOTES PANEL -->
  <section class="panel" [attr.aria-label]="t()('notes.pageTitle')">
    <div class="panel-header">
      @if (notesSearchOpen()) {
        <label class="search-inline" for="notes-search">
          <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
          <input
            id="notes-search"
            type="search"
            class="search-input"
            [placeholder]="t()('notes.searchPlaceholder')"
            [value]="notesSearch()"
            (input)="notesSearch.set($any($event.target).value)"
            [attr.aria-label]="t()('notes.searchPlaceholder')"
            autofocus />
          <button class="search-close" type="button" (click)="closeNotesSearch()" [attr.aria-label]="t()('modal.cancel')">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </label>
      } @else {
        <h2 class="panel-title">{{ t()('notes.pageTitle') }}</h2>
        <div class="header-actions">
          <button class="search-toggle" type="button" (click)="notesSearchOpen.set(true)" [attr.aria-label]="t()('notes.searchPlaceholder')">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          </button>
          <app-primary-button
            [config]="{texto: t()('notes.newNote'), icon: 'fa-solid fa-circle-plus'}"
            (clicked)="openAddNoteModal()" />
        </div>
      }
    </div>

    <div class="category-chips" role="group" [attr.aria-label]="t()('finance.filterBy')">
      <button
        class="chip"
        [class.active]="selectedCategory() === 'all'"
        (click)="selectCategory('all')"
        [attr.aria-pressed]="selectedCategory() === 'all'">
        {{ t()('notes.filterAll') }}
      </button>
      @for (cat of categories(); track cat) {
        <button
          class="chip"
          [class.active]="selectedCategory() === cat"
          (click)="selectCategory(cat)"
          [attr.aria-pressed]="selectedCategory() === cat">
          {{ cat }}
        </button>
      }
      @if (addingCategory()) {
        <input
          class="chip-input"
          type="text"
          [placeholder]="t()('notes.categoryPlaceholder')"
          [value]="newCategoryInput()"
          (input)="newCategoryInput.set($any($event.target).value)"
          (keydown.enter)="confirmNewCategory()"
          (keydown.escape)="cancelNewCategory()"
          (blur)="confirmNewCategory()"
          [attr.aria-label]="t()('notes.categoryPlaceholder')"
          autofocus />
      } @else {
        <button
          class="chip chip-add"
          (click)="startAddingCategory()"
          [attr.aria-label]="t()('notes.filterAll')">
          +
        </button>
      }
    </div>

    <app-text-notes
      [searchQuery]="notesSearch()"
      [selectedCategory]="selectedCategory()"
      class="notes-content"
      (addNote)="openAddNoteModal()"
      (editNote)="openEditNoteModal($event)" />
  </section>

  <!-- TO-DO PANEL -->
  <section class="panel" [attr.aria-label]="t()('notes.todoTitle')">
    <div class="panel-header">
      @if (todosSearchOpen()) {
        <label class="search-inline" for="todos-search">
          <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
          <input
            id="todos-search"
            type="search"
            class="search-input"
            [placeholder]="t()('notes.searchTodosPlaceholder')"
            [value]="todosSearch()"
            (input)="todosSearch.set($any($event.target).value)"
            [attr.aria-label]="t()('notes.searchTodosPlaceholder')"
            autofocus />
          <button class="search-close" type="button" (click)="closeTodosSearch()" [attr.aria-label]="t()('modal.cancel')">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </label>
      } @else {
        <h2 class="panel-title">{{ t()('notes.todoTitle') }}</h2>
        <button class="search-toggle" type="button" (click)="todosSearchOpen.set(true)" [attr.aria-label]="t()('notes.searchTodosPlaceholder')">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        </button>
      }
    </div>

    <app-to-do [searchQuery]="todosSearch()" [initialList]="pendingTodoList()" class="todos-content" />
  </section>

</div>

@if (showAddNoteModal()) {
  <app-add-note-modal
    [note]="editingNote()"
    [existingCategories]="categories()"
    (cerrar)="closeAddNoteModal()"
    (guardado)="closeAddNoteModal()" />
}
