<app-header [name]="nombreVista()"></app-header>

<div class="body">

  <!-- NOTES PANEL -->
  <section class="panel" aria-label="Notes">
    <div class="panel-header">
      @if (notesSearchOpen()) {
        <label class="search-inline" for="notes-search">
          <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
          <input
            id="notes-search"
            type="search"
            class="search-input"
            placeholder="Search in your notes"
            [value]="notesSearch()"
            (input)="notesSearch.set($any($event.target).value)"
            aria-label="Search notes"
            autofocus />
          <button class="search-close" type="button" (click)="closeNotesSearch()" aria-label="Close search">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </label>
      } @else {
        <h2 class="panel-title">Notes</h2>
        <div class="header-actions">
          <button class="search-toggle" type="button" (click)="notesSearchOpen.set(true)" aria-label="Search notes">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          </button>
          <app-primary-button
            [config]="{texto: 'New note', icon: 'fa-solid fa-circle-plus'}"
            (clicked)="openAddNoteModal()"
            aria-label="Create new note" />
        </div>
      }
    </div>

    <div class="category-chips" role="group" aria-label="Filter by category">
      <button
        class="chip"
        [class.active]="selectedCategory() === 'all'"
        (click)="selectCategory('all')"
        [attr.aria-pressed]="selectedCategory() === 'all'">
        All
      </button>
      @for (cat of categories(); track cat) {
        <button
          class="chip"
          [class.active]="selectedCategory() === cat"
          (click)="selectCategory(cat)"
          [attr.aria-pressed]="selectedCategory() === cat">
          {{ cat }}
        </button>
      }
      @if (addingCategory()) {
        <input
          class="chip-input"
          type="text"
          placeholder="Category name"
          [value]="newCategoryInput()"
          (input)="newCategoryInput.set($any($event.target).value)"
          (keydown.enter)="confirmNewCategory()"
          (keydown.escape)="cancelNewCategory()"
          (blur)="confirmNewCategory()"
          aria-label="New category name"
          autofocus />
      } @else {
        <button
          class="chip chip-add"
          (click)="startAddingCategory()"
          aria-label="Add category filter">
          +
        </button>
      }
    </div>

    <app-text-notes
      [searchQuery]="notesSearch()"
      [selectedCategory]="selectedCategory()"
      class="notes-content"
      (addNote)="openAddNoteModal()"
      (editNote)="openEditNoteModal($event)" />
  </section>

  <!-- TO-DO PANEL -->
  <section class="panel" aria-label="To-do">
    <div class="panel-header">
      @if (todosSearchOpen()) {
        <label class="search-inline" for="todos-search">
          <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
          <input
            id="todos-search"
            type="search"
            class="search-input"
            placeholder="Search in your to-do's"
            [value]="todosSearch()"
            (input)="todosSearch.set($any($event.target).value)"
            aria-label="Search to-dos"
            autofocus />
          <button class="search-close" type="button" (click)="closeTodosSearch()" aria-label="Close search">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </label>
      } @else {
        <h2 class="panel-title">To-do</h2>
        <button class="search-toggle" type="button" (click)="todosSearchOpen.set(true)" aria-label="Search to-dos">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        </button>
      }
    </div>

    <app-to-do [searchQuery]="todosSearch()" [initialList]="pendingTodoList()" class="todos-content" />
  </section>

</div>

@if (showAddNoteModal()) {
  <app-add-note-modal
    [note]="editingNote()"
    [existingCategories]="categories()"
    (cerrar)="closeAddNoteModal()"
    (guardado)="closeAddNoteModal()" />
}
